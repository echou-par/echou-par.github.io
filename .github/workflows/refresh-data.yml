name: Refresh PAR Intel data

on:
  schedule:
    # Every 30 minutes (live refresh for dashboard)
    - cron: '*/30 * * * *'
    # Daily canonical snapshot + product-updates fetch at 9:30 AM ET.
    # Cover both EDT (13:30 UTC) and EST (14:30 UTC). This slot also
    # matches the week-rollover anchor for the weekly product-updates
    # accumulator — so the first fetch of a new week happens after the
    # boundary, not before it (avoids items landing in the prior week).
    - cron: '30 13 * * *'
    - cron: '30 14 * * *'
  workflow_dispatch:  # allow manual trigger from GitHub UI
    inputs:
      with_product_updates:
        description: 'Also fetch product updates (RSS/site-search)'
        required: false
        default: 'false'
        type: boolean
  push:
    paths:
      - 'scripts/fetch_data.py'
      - 'scripts/private_company_data.py'
      - '.github/workflows/refresh-data.yml'

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests feedparser yfinance

      - name: Determine flags
        id: flags
        shell: bash
        run: |
          # Product-updates flag is set when:
          #   1. One of the daily 9:30 AM ET crons fired
          #   2. Manual workflow_dispatch with with_product_updates=true
          echo "Event name: ${{ github.event_name }}"
          echo "Event schedule: ${{ github.event.schedule }}"
          echo "Dispatch input with_product_updates: ${{ github.event.inputs.with_product_updates }}"

          EXTRA_FLAGS=""
          SCHED="${{ github.event.schedule }}"
          EVENT="${{ github.event_name }}"
          DISPATCH_INPUT="${{ github.event.inputs.with_product_updates }}"

          # Use case statement with pattern matching for robustness against
          # whitespace variations in the schedule string. The daily 9:30 AM ET
          # slot doubles as the product-updates trigger — runs in both EDT
          # (13:30 UTC) and EST (14:30 UTC) to cover the DST transition. This
          # timing matches the weekly accumulator's Monday 9:30 AM ET anchor
          # so items land in the correct week.
          case "$SCHED" in
            "30 13 * * *"|"30 14 * * *")
              echo "Daily 9:30 AM ET schedule matched — enabling --with-product-updates"
              EXTRA_FLAGS="--with-product-updates"
              ;;
          esac

          if [ "$EVENT" = "workflow_dispatch" ] && [ "$DISPATCH_INPUT" = "true" ]; then
            echo "Manual dispatch with product-updates — enabling --with-product-updates"
            EXTRA_FLAGS="--with-product-updates"
          fi

          echo "Resolved EXTRA_FLAGS: '$EXTRA_FLAGS'"
          echo "flags=$EXTRA_FLAGS" >> "$GITHUB_OUTPUT"

      - name: Fetch data
        run: python scripts/fetch_data.py ${{ steps.flags.outputs.flags }}

      - name: Commit & push if changed
        run: |
          git config user.name "PAR Intel Bot"
          git config user.email "actions@github.com"
          git add par-comp-intel/data/ par-comp-intel/history/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: refresh intel data [skip ci]"
            git push
          fi
