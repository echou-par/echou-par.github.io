name: Refresh PAR Intel data

on:
  schedule:
    # Every 30 minutes (live refresh for dashboard)
    - cron: '*/30 * * * *'
    # Daily canonical snapshot at 9:30 AM ET — cover both EST (14:30 UTC) and EDT (13:30 UTC)
    - cron: '30 13 * * *'
    - cron: '30 14 * * *'
  workflow_dispatch:  # allow manual trigger from GitHub UI
  push:
    paths:
      - 'scripts/fetch_data.py'
      - 'scripts/private_company_data.py'
      - '.github/workflows/refresh-data.yml'

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests feedparser yfinance

      - name: Fetch data
        run: python scripts/fetch_data.py

      - name: Commit & push if changed
        run: |
          git config user.name "PAR Intel Bot"
          git config user.email "actions@github.com"
          git add par-comp-intel/data/ par-comp-intel/history/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: refresh intel data [skip ci]"
            git push
          fi
