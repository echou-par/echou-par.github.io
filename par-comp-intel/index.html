<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAR Intel — Sign In</title>
<link rel="icon" type="image/jpeg" href="assets/par-logo.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;500;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #F3F5FF;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #2F3452;
  }
  .card {
    background: #ffffff;
    border: 0.5px solid rgba(47, 52, 82, 0.12);
    border-radius: 14px;
    padding: 40px 44px;
    width: 380px;
    max-width: 92vw;
  }
  .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .par-logo-img { height: 32px; width: 32px; border-radius: 5px; display: block; }
  .logo-title { font-size: 18px; font-weight: 800; letter-spacing: -0.3px; color: #6864D1; }
  .subtitle { font-size: 13px; color: #8a90a8; margin-bottom: 28px; }
  label { font-size: 12px; color: #5a607a; display: block; margin-bottom: 5px; }
  input[type="password"] {
    width: 100%;
    padding: 10px 13px;
    border: 0.5px solid rgba(47, 52, 82, 0.22);
    border-radius: 7px;
    font-size: 14px;
    font-family: inherit;
    background: #F3F5FF;
    color: #2F3452;
    outline: none;
    transition: border-color 0.15s;
  }
  input[type="password"]:focus { border-color: #6864D1; background: #fff; }
  button {
    width: 100%;
    margin-top: 14px;
    padding: 10px;
    background: #6864D1;
    color: white;
    border: none;
    border-radius: 7px;
    font-size: 14px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  button:hover { opacity: 0.9; }
  .error {
    margin-top: 12px;
    font-size: 13px;
    color: #FF2751;
    background: rgba(255, 39, 81, 0.1);
    padding: 8px 12px;
    border-radius: 6px;
    display: none;
  }
  .footer { margin-top: 28px; font-size: 11px; color: #8a90a8; text-align: center; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <img src="assets/par-logo.jpg" alt="PAR" class="par-logo-img">
    <span class="logo-title">Competitive Intelligence Monitor</span>
  </div>
  <div class="subtitle">Internal access — sign in to continue</div>
  <label for="pw">Access password</label>
  <input type="password" id="pw" placeholder="Enter password" autofocus onkeydown="if(event.key==='Enter')unlock()">
  <button onclick="unlock()">Sign in</button>
  <div class="error" id="err">Incorrect password. Please try again.</div>
  <div class="footer">PAR Technology · Internal use only</div>
</div>

<script>
// SHA-256 hash of the password. To change the password:
// 1. Run: echo -n "yournewpassword" | sha256sum
// 2. Replace the hash string below.
// Current password hash — set during deploy:
const HASH = '5f56036d7250f4c96632fe9dc1cd06609204599a399af738b3d557012f66b07b';

async function sha256(msg) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function unlock() {
  const val = document.getElementById('pw').value;
  if (!val) return;
  const h = await sha256(val);
  if (h === HASH) {
    sessionStorage.setItem('par_intel_auth', HASH);
    window.location.href = 'dashboard.html';
  } else {
    document.getElementById('err').style.display = 'block';
    document.getElementById('pw').value = '';
    document.getElementById('pw').focus();
  }
}

// If already authed this session, skip gate
sha256('').then(() => {
  const stored = sessionStorage.getItem('par_intel_auth');
  if (stored && stored === HASH) window.location.href = 'dashboard.html';
});
</script>
</body>
</html>
